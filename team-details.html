<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUREKA | Team Core</title>
    <script>
        // Immediate early-check for Lite Mode to prevent flash of heavy animations
        const isEarlyLite = localStorage.getItem('lite-mode') === 'true';
        if (isEarlyLite) {
            document.documentElement.classList.add('lite-mode');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&family=JetBrains+Mono&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --navy: #0B1118;
            --gold: #C5A16F;
            --blue: #A3C4D9;
        }

        /* Lite Mode Override Rules */
        .lite-mode *, 
        .lite-mode *::before, 
        .lite-mode *::after {
            animation-delay: 0s !important;
            animation-duration: 0s !important;
            animation-iteration-count: 1 !important;
            transition-delay: 0s !important;
            transition-duration: 0s !important;
            scroll-behavior: auto !important;
            backdrop-filter: none !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }

        .lite-mode #loader {
            display: none !important;
        }

        .lite-mode .profile-card:hover {
            transform: none !important;
            border-color: rgba(197, 161, 111, 0.1) !important;
            background: rgba(255, 255, 255, 0.02) !important;
        }

        .lite-mode .profile-card:hover .profile-img {
            filter: grayscale(100%) !important;
            transform: none !important;
        }

        body {
            background: var(--navy);
            color: #FDF6E3;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        .font-sync {
            font-family: 'Syncopate', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Cinematic Profile Card */
        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(197, 161, 111, 0.1);
            transition: all 0.5s ease;
            position: relative;
        }

        .profile-card:hover {
            border-color: var(--gold);
            background: rgba(197, 161, 111, 0.05);
            transform: translateY(-5px);
        }

        .img-frame {
            aspect-ratio: 1/1;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            border: 1px solid rgba(197, 161, 111, 0.2);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .profile-card:hover .profile-img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--navy);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* cursor */

        #fluid-canvas {
            width: 100vw;
            height: 100vh;
            opacity: 0.6;
            /* Keeps it cinematic and not distracting */
            filter: saturate(1.2) brightness(1.1);
        }

        /* Ensure the background stays dark so the gold fluid pops */
        body {
            background-color: #0B1118 !important;
        }
    </style>
</head>

<body>

    <!-- Floating Mode Toggle Widget -->
    <div id="mode-toggle-widget" class="fixed bottom-6 left-6 z-[9999] flex flex-col items-start font-mono text-[9px] pointer-events-auto">
        <div class="glass-panel p-3 border-[#C5A16F]/30 bg-[#0B1118]/90 flex flex-col gap-2 relative shadow-2xl">
            <!-- Brackets -->
            <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-[#C5A16F]/60"></div>
            <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-[#C5A16F]/60"></div>
            
            <div class="text-[#A3C4D9] uppercase tracking-[0.2em] font-sync text-[8px] flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" id="mode-pulse"></span>
                SYS_VISUALS: <span id="current-mode-label" class="text-white">NORMAL</span>
            </div>
            
            <div class="flex gap-2">
                <button id="btn-mode-normal" onclick="setSystemMode('normal')" 
                    class="px-3 py-1.5 border border-[#C5A16F] text-[#C5A16F] transition hover:bg-[#C5A16F]/10 hover:scale-105 active:scale-95">
                    [ NORMAL_MODE ]
                </button>
                <button id="btn-mode-lite" onclick="setSystemMode('lite')" 
                    class="px-3 py-1.5 border border-white/20 text-gray-500 transition hover:border-[#C5A16F]/50 hover:text-white hover:scale-105 active:scale-95">
                    [ LITE_MODE ]
                </button>
            </div>
        </div>
    </div>

    <div id="loader">
        <div class="font-mono text-[10px] text-[#A3C4D9] mb-4 tracking-[0.5em]">DECRYPTING_TEAM_FILES...</div>
        <div class="w-48 h-[1px] bg-gray-800">
            <div id="load-bar" class="h-full bg-[#C5A16F] w-0"></div>
        </div>
    </div>

    <header class="p-8 flex justify-between items-center relative z-20">
        <a href="index.html" class="font-sync text-[10px] tracking-widest text-gray-500 hover:text-[#C5A16F]">←
            SYSTEM_BACK</a>
        <div id="team-id-tag" class="font-mono text-[10px] text-[#C5A16F] tracking-[0.4em]">UNIT // NULL</div>
    </header>

    <section class="py-20 px-8">
        <div class="max-w-7xl mx-auto text-center mb-24">
            <h1 id="team-title"
                class="text-5xl md:text-7xl font-sync font-bold uppercase tracking-tighter mb-4 opacity-0">Loading...
            </h1>
            <p id="team-subtitle" class="text-[#A3C4D9] font-mono text-xs tracking-widest opacity-0 uppercase">Accessing
                secure database</p>
        </div>

        <div id="member-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 max-w-7xl mx-auto">
            <!-- Members will be injected here by JavaScript -->
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- THE DATABASE ---
        if (!window.supabaseClient) {
            window.supabaseClient = window.supabase.createClient(
                "https://eegcyreyyeuihnspasbh.supabase.co",
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZ2N5cmV5eWV1aWhuc3Bhc2JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODU3MTMsImV4cCI6MjA5MTA2MTcxM30.QwndBP4Hj3k3q-jcjGN1sXzZt45_p0or_4JnRyB5E-w"
            );
        }
        var supabase = window.supabaseClient;
        console.log("SUPABASE CLIENT:", supabase);

        // --- THE LOGIC ---
        console.log("FULL URL:", window.location.href);
const params = new URLSearchParams(window.location.search);
const teamId = params.get('team');
console.log("teamId:", teamId);
        async function init() {
            try {
                const params = new URLSearchParams(window.location.search);
                const teamId = params.get('team');
                window.history.replaceState({}, document.title, window.location.pathname);
                const { data: team } = await supabase
                    .from("teams")
                    .select("*")
                    .eq("team_id", teamId)
                    .maybeSingle();

                const { data: members } = await supabase
                    .from("members")
                    .select("*")
                    .eq("team_id", teamId);

                console.log("TEAM:", team);
                console.log("MEMBERS:", members);

                document.getElementById('team-title').innerText = team?.title || "No Data";
                document.getElementById('team-subtitle').innerText = team?.subtitle || "";
                document.getElementById('team-id-tag').innerText = team?.tag || "";

                const grid = document.getElementById('member-grid');

                if (!members || members.length === 0) {
                    grid.innerHTML = "<p class='text-center text-gray-500'>No members found</p>";
                } else {
                    grid.innerHTML = members.map(m => `
                <div class="profile-card p-6 member-item opacity-0">
                    <div class="img-frame mb-6">
                        <img src="${m.image}" class="profile-img">
                    </div>
                    <h3>${m.name}</h3>
                </div>
            `).join('');
                }

            } catch (err) {
                console.error("INIT ERROR:", err);
            } finally {
                startAnimations();
            }
        }

        function startAnimations() {
            const isLiteMode = localStorage.getItem('lite-mode') === 'true';
            if (isLiteMode) {
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
                gsap.set("#team-title, #team-subtitle, .member-item", { opacity: 1, y: 0 });
            } else {
                const tl = gsap.timeline();
                tl.to("#load-bar", { width: "100%", duration: 1.2 })
                    .to("#loader", { yPercent: -100, duration: 0.8, ease: "expo.inOut" })
                    .to("#team-title, #team-subtitle", { opacity: 1, y: 0, duration: 1, stagger: 0.2 }, "-=0.3")
                    .to(".member-item", { opacity: 1, y: 0, duration: 1, stagger: 0.1 }, "-=0.5");
            }
        }

        // --- 4. System Mode Selector Widget Integration ---
        function setSystemMode(mode) {
            const currentMode = localStorage.getItem('lite-mode') === 'true' ? 'lite' : 'normal';
            if (currentMode === mode) return;
            
            localStorage.setItem('lite-mode', mode === 'lite' ? 'true' : 'false');
            
            const label = document.getElementById('current-mode-label');
            if (label) label.innerText = 'REBOOTING...';
            
            document.body.style.opacity = '0.3';
            document.body.style.filter = 'blur(5px)';
            
            setTimeout(() => {
                window.location.reload();
            }, 400);
        }

        function initModeToggle() {
            const isLite = localStorage.getItem('lite-mode') === 'true';
            
            const normalBtn = document.getElementById('btn-mode-normal');
            const liteBtn = document.getElementById('btn-mode-lite');
            const label = document.getElementById('current-mode-label');
            const pulse = document.getElementById('mode-pulse');
            
            if (isLite) {
                if (liteBtn) {
                    liteBtn.style.background = '#C5A16F';
                    liteBtn.style.color = '#0B1118';
                    liteBtn.style.borderColor = '#C5A16F';
                }
                if (normalBtn) {
                    normalBtn.style.background = 'transparent';
                    normalBtn.style.color = '#6b7280';
                    normalBtn.style.borderColor = 'rgba(255,255,255,0.1)';
                }
                if (label) label.innerText = 'LITE';
                if (pulse) {
                    pulse.className = 'w-1.5 h-1.5 rounded-full bg-amber-500';
                }
            } else {
                if (normalBtn) {
                    normalBtn.style.background = '#C5A16F';
                    normalBtn.style.color = '#0B1118';
                    normalBtn.style.borderColor = '#C5A16F';
                }
                if (liteBtn) {
                    liteBtn.style.background = 'transparent';
                    liteBtn.style.color = '#6b7280';
                    liteBtn.style.borderColor = 'rgba(255,255,255,0.1)';
                }
                if (label) label.innerText = 'NORMAL';
                if (pulse) {
                    pulse.className = 'w-1.5 h-1.5 rounded-full bg-green-500';
                }
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            initModeToggle();
        });

        window.onload = init;
    </script>
</body>

</html>
