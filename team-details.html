    <style>
        :root { --navy: #0B1118; --gold: #C5A16F; --blue: #A3C4D9; }
        body { background: var(--navy); color: #FDF6E3; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Cinematic Profile Card */
        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(197, 161, 111, 0.1);
            transition: all 0.5s ease;
            position: relative;
        }
        .profile-card:hover { border-color: var(--gold); background: rgba(197, 161, 111, 0.05); transform: translateY(-5px); }
        
        .img-frame {
            aspect-ratio: 1/1;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            border: 1px solid rgba(197, 161, 111, 0.2);
        }
        .profile-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .profile-card:hover .profile-img { filter: grayscale(0%); transform: scale(1.05); }

        /* Loader */
        #loader { position: fixed; inset: 0; background: var(--navy); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>

        // --- THE LOGIC ---
        function init() {
            // 1. Get Team ID from URL (e.g., ?team=robotics)
            const params = new URLSearchParams(window.location.search);
            const teamId = params.get('team');
            //hide url attributes
            window.history.replaceState({}, document.title, window.location.pathname);

            // 2. Fallback if team doesn't exist
            if (!teamId || !teamData[teamId]) {
                document.getElementById('team-title').innerText = "DATA NOT FOUND";
                return;
            }

            const data = teamData[teamId];

            // 3. Update Text Content
            document.getElementById('team-title').innerText = data.title;
            document.getElementById('team-subtitle').innerText = data.subtitle;
            document.getElementById('team-id-tag').innerText = data.tag;

            // 4. Build Member Cards
            const grid = document.getElementById('member-grid');
            grid.innerHTML = data.members.map((m, index) => `
                <div class="profile-card p-6 member-item opacity-0">
                    <div class="img-frame mb-6">
                        <img src="${m.img}?q=80&w=500" class="profile-img">
                    </div>
                    <div class="space-y-3">
                        <div>
                            <h3 class="font-sync text-sm text-[#C5A16F]">${m.name}</h3>
                            <p class="text-[9px] font-mono text-[#A3C4D9] uppercase tracking-widest">${m.role}</p>
                        </div>
                        <div class="h-[1px] bg-gray-800 w-full"></div>
                        <p class="text-[10px] text-gray-500 uppercase font-mono">Spec: ${m.spec}</p>
                    </div>
                </div>
            `).join('');

            // 5. Start Animations
            startAnimations();
        }

        function startAnimations() {
            const tl = gsap.timeline();
            tl.to("#load-bar", { width: "100%", duration: 1.2 })
              .to("#loader", { yPercent: -100, duration: 0.8, ease: "expo.inOut" })
              .to("#team-title, #team-subtitle", { opacity: 1, y: 0, duration: 1, stagger: 0.2 }, "-=0.3")
              .to(".member-item", { opacity: 1, y: 0, duration: 1, stagger: 0.1 }, "-=0.5");
        }

        window.onload = init;
